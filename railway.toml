[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile"

[deploy]
# Push schema, regenerate client, then build and start
startCommand = "npx prisma db push --accept-data-loss && npx prisma generate && pnpm build && next start -H 0.0.0.0"
healthcheckPath = "/api/health"
healthcheckTimeout = 600
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Enable build caching for faster deploys
[build.env]
NIXPACKS_NO_MUSL = "1"
NIXPACKS_BUILD_WORKERS = "2"
