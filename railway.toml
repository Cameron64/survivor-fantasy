[build]
builder = "nixpacks"
# Optimize build by using pnpm fetch for faster installs
buildCommand = "pnpm install --frozen-lockfile && pnpm build"

[deploy]
startCommand = "npx prisma db push && npx prisma generate && next start -H 0.0.0.0"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Enable build caching for faster deploys
[build.env]
NIXPACKS_NO_MUSL = "1"
NIXPACKS_BUILD_WORKERS = "2"
