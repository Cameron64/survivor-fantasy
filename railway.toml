[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && npx prisma generate && pnpm build"

[deploy]
startCommand = "npx prisma db push --accept-data-loss && next start -H 0.0.0.0"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Enable build caching for faster deploys
[build.env]
NIXPACKS_NO_MUSL = "1"
NIXPACKS_BUILD_WORKERS = "2"
